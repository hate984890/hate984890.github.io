<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maoklink - 资源分享频道</title>
    <style>
        :root {
            --bg-deep: #0a0a14;
            --bg-mid: #111128;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.10);
            --glass-highlight: rgba(255, 255, 255, 0.06);
            --text-primary: #e8e8f0;
            --text-secondary: #b0b0c8;
            --text-muted: #8888a8;
            --accent-1: #7c6ff7;
            --accent-2: #e056a0;
            --accent-3: #f7775e;
            --qq-blue: #5b9cf5;
            --kuaishou-orange: #ff6b35;
            --bilibili-pink: #fb7299;
            --card-shadow: 0 8px 40px rgba(0, 0, 0, 0.45);
            --glow-1: rgba(124, 111, 247, 0.35);
            --glow-2: rgba(224, 86, 160, 0.30);
            --glow-3: rgba(247, 119, 94, 0.25);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 25% 15%, rgba(124, 111, 247, 0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 72% 20%, rgba(224, 86, 160, 0.10) 0%, transparent 55%),
                radial-gradient(ellipse at 40% 75%, rgba(247, 119, 94, 0.09) 0%, transparent 55%),
                radial-gradient(ellipse at 60% 55%, rgba(91, 156, 245, 0.06) 0%, transparent 60%);
            background-attachment: fixed;
        }

        /* ============ 浮动光斑 ============ */
        .floating-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.55;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            will-change: transform, opacity;
        }

        .orb-1 {
            width: 320px;
            height: 320px;
            background: var(--glow-1);
            top: -8%;
            left: 10%;
            animation-name: orbFloat1;
            animation-duration: 14s;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 260px;
            height: 260px;
            background: var(--glow-2);
            top: 50%;
            right: -6%;
            animation-name: orbFloat2;
            animation-duration: 17s;
            animation-delay: -4s;
        }
        .orb-3 {
            width: 280px;
            height: 280px;
            background: var(--glow-3);
            bottom: -10%;
            left: 30%;
            animation-name: orbFloat3;
            animation-duration: 15s;
            animation-delay: -8s;
        }
        .orb-4 {
            width: 200px;
            height: 200px;
            background: rgba(91, 156, 245, 0.20);
            top: 30%;
            left: -5%;
            animation-name: orbFloat4;
            animation-duration: 19s;
            animation-delay: -2s;
        }
        .orb-5 {
            width: 180px;
            height: 180px;
            background: rgba(255, 255, 255, 0.06);
            top: 60%;
            right: 15%;
            animation-name: orbFloat1;
            animation-duration: 22s;
            animation-delay: -11s;
        }

        @keyframes orbFloat1 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(40px, -55px) scale(1.12);
            }
            50% {
                transform: translate(-20px, -20px) scale(0.92);
            }
            75% {
                transform: translate(-35px, 40px) scale(1.08);
            }
        }
        @keyframes orbFloat2 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(-50px, -30px) scale(1.1);
            }
            50% {
                transform: translate(15px, 45px) scale(0.9);
            }
            75% {
                transform: translate(30px, -35px) scale(1.06);
            }
        }
        @keyframes orbFloat3 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -40px) scale(1.13);
            }
            66% {
                transform: translate(-40px, 25px) scale(0.88);
            }
        }
        @keyframes orbFloat4 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.4;
            }
            30% {
                transform: translate(45px, 30px) scale(1.18);
                opacity: 0.6;
            }
            60% {
                transform: translate(-25px, -35px) scale(0.85);
                opacity: 0.35;
            }
        }

        /* ============ 主容器 ============ */
        .main-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
            animation: fadeInUp 0.9s var(--transition-smooth) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ 磨砂玻璃主卡片 ============ */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 40px 32px 36px;
            box-shadow: var(--card-shadow), inset 0 1px 0 var(--glass-highlight);
            position: relative;
            overflow: hidden;
            transition: all 0.4s var(--transition-smooth);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.25),
                    rgba(255, 255, 255, 0.45),
                    rgba(255, 255, 255, 0.25),
                    transparent);
            border-radius: 50%;
        }

        .glass-card::after {
            content: '';
            position: absolute;
            top: -80px;
            right: -80px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.025) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* ============ 头像区域 ============ */
        .avatar-section {
            display: flex;
            justify-content: center;
            margin-bottom: 22px;
            position: relative;
            z-index: 1;
        }

        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.5s var(--transition-bounce);
        }

        .avatar-wrapper:hover {
            transform: scale(1.06);
        }
        .avatar-wrapper:active {
            transform: scale(0.96);
        }

        .avatar-glow-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: conic-gradient(from 0deg,
                    var(--accent-1),
                    var(--accent-2),
                    var(--accent-3),
                    var(--accent-1));
            animation: ringSpin 6s linear infinite;
            filter: blur(6px);
            opacity: 0.7;
            z-index: 0;
            pointer-events: none;
        }
        .avatar-glow-ring::after {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background: var(--bg-deep);
            z-index: 1;
        }

        @keyframes ringSpin {
            to {
                transform: rotate(360deg);
            }
        }

        .avatar-pulse {
            position: absolute;
            inset: -14px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.18);
            animation: pulseOut 2.6s ease-out infinite;
            pointer-events: none;
            z-index: -1;
        }
        .avatar-pulse:nth-child(2) {
            animation-delay: 0.9s;
        }
        .avatar-pulse:nth-child(3) {
            animation-delay: 1.8s;
        }

        @keyframes pulseOut {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }
            100% {
                transform: scale(1.55);
                opacity: 0;
            }
        }

        .avatar-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            position: relative;
            z-index: 2;
            border: 3px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.35);
            transition: all 0.4s var(--transition-smooth);
            background: linear-gradient(135deg, #2a2a4a 0%, #1a1a30 100%);
        }
        .avatar-wrapper:hover .avatar-img {
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 36px rgba(124, 111, 247, 0.3);
        }

        /* ============ 名字 & 标签 ============ */
        .name-section {
            text-align: center;
            position: relative;
            z-index: 1;
            margin-bottom: 6px;
        }

        .display-name {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, #e8e8f0 0%, #c4c4e0 40%, #a8b8f8 70%, #e0c0e8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .tagline {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        /* ============ 自我介绍 ============ */
        .bio-section {
            text-align: center;
            position: relative;
            z-index: 1;
            margin-bottom: 26px;
            padding: 0 8px;
        }

        .bio-text {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: 0.015em;
        }

        .divider {
            width: 60%;
            height: 1px;
            margin: 0 auto 26px;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.14),
                    rgba(255, 255, 255, 0.06),
                    transparent);
            border-radius: 50%;
            position: relative;
            z-index: 1;
        }

        /* ============ 社交卡片区域 ============ */
        .social-cards {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .social-card {
            flex: 1;
            min-width: 130px;
            max-width: 160px;
            background: rgba(255, 255, 255, 0.035);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-lg);
            padding: 18px 14px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.35s var(--transition-smooth);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .social-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.06);
        }
        .social-card:active {
            transform: scale(0.96);
            transition: transform 0.15s var(--transition-smooth);
        }

        .social-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 15%;
            width: 70%;
            height: 2px;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.35s var(--transition-smooth);
        }
        .social-card:hover::before {
            opacity: 1;
        }
        .social-card.qq::before {
            background: var(--qq-blue);
            box-shadow: 0 0 18px var(--qq-blue);
        }
        .social-card.kuaishou::before {
            background: var(--kuaishou-orange);
            box-shadow: 0 0 18px var(--kuaishou-orange);
        }
        .social-card.bilibili::before {
            background: var(--bilibili-pink);
            box-shadow: 0 0 18px var(--bilibili-pink);
        }

        .social-icon-wrap {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.35s var(--transition-smooth);
            position: relative;
            z-index: 1;
        }
        .social-card.qq .social-icon-wrap {
            background: rgba(91, 156, 245, 0.18);
            color: var(--qq-blue);
        }
        .social-card.kuaishou .social-icon-wrap {
            background: rgba(255, 107, 53, 0.18);
            color: var(--kuaishou-orange);
        }
        .social-card.bilibili .social-icon-wrap {
            background: rgba(251, 114, 153, 0.18);
            color: var(--bilibili-pink);
        }
        .social-card:hover .social-icon-wrap {
            transform: scale(1.1);
        }

        .social-icon-wrap svg {
            width: 24px;
            height: 24px;
            transition: transform 0.35s var(--transition-smooth);
        }
        .social-card:hover .social-icon-wrap svg {
            transform: rotate(-5deg) scale(1.08);
        }

        .social-label {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            color: var(--text-primary);
            transition: color 0.3s;
            position: relative;
            z-index: 1;
        }
        .social-sub {
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
            transition: color 0.3s;
            position: relative;
            z-index: 1;
            word-break: break-all;
        }
        .social-card:hover .social-sub {
            color: var(--text-secondary);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(20, 20, 35, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #e8e8f0;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            font-weight: 500;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: all 0.4s var(--transition-bounce);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .glass-card {
                padding: 30px 18px 28px;
                border-radius: var(--radius-lg);
            }
            .avatar-wrapper {
                width: 90px;
                height: 90px;
            }
            .avatar-img {
                width: 90px;
                height: 90px;
            }
            .avatar-glow-ring {
                inset: -6px;
            }
            .avatar-pulse {
                inset: -11px;
            }
            .display-name {
                font-size: 1.45rem;
            }
            .bio-text {
                font-size: 0.88rem;
                padding: 0 4px;
            }
            .social-cards {
                gap: 10px;
            }
            .social-card {
                min-width: 100px;
                max-width: 140px;
                padding: 14px 10px 12px;
                gap: 8px;
                border-radius: var(--radius-md);
            }
            .social-icon-wrap {
                width: 40px;
                height: 40px;
            }
            .social-icon-wrap svg {
                width: 20px;
                height: 20px;
            }
            .social-label {
                font-size: 0.78rem;
            }
            .social-sub {
                font-size: 0.68rem;
            }
            .tagline {
                font-size: 0.78rem;
            }
            .orb-1 {
                width: 200px;
                height: 200px;
                top: -15%;
                left: -10%;
            }
            .orb-2 {
                width: 160px;
                height: 160px;
                top: 55%;
                right: -15%;
            }
            .orb-3 {
                width: 180px;
                height: 180px;
                bottom: -15%;
                left: 10%;
            }
            .orb-4 {
                width: 120px;
                height: 120px;
                top: 20%;
                left: -10%;
            }
            .orb-5 {
                width: 100px;
                height: 100px;
                top: 65%;
                right: 5%;
            }
        }

        @media (max-width: 380px) {
            .social-cards {
                flex-direction: column;
                align-items: center;
            }
            .social-card {
                max-width: 100%;
                width: 100%;
                flex-direction: row;
                justify-content: flex-start;
                gap: 14px;
                padding: 14px 18px;
                text-align: left;
                border-radius: var(--radius-sm);
            }
            .social-card .social-icon-wrap {
                flex-shrink: 0;
            }
            .glass-card {
                padding: 24px 14px 22px;
            }
            .display-name {
                font-size: 1.3rem;
            }
            .bio-text {
                font-size: 0.82rem;
            }
        }

        @media (min-width: 1200px) {
            .main-wrapper {
                max-width: 560px;
            }
            .glass-card {
                padding: 48px 40px 42px;
            }
            .display-name {
                font-size: 2rem;
            }
            .bio-text {
                font-size: 1rem;
            }
            .social-card {
                max-width: 170px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .orb {
                animation-duration: 30s !important;
            }
            .avatar-glow-ring {
                animation-duration: 12s !important;
            }
            .avatar-pulse {
                animation-duration: 5s !important;
            }
            .main-wrapper {
                animation: none;
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="floating-orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>
    </div>

    <main class="main-wrapper">
        <div class="glass-card">

            <!-- 头像区域 -->
            <div class="avatar-section">
                <div class="avatar-wrapper" id="avatarWrapper" title="Maoklink 头像">

                    <div class="avatar-pulse" aria-hidden="true"></div>
                    <div class="avatar-pulse" aria-hidden="true"></div>
                    <div class="avatar-pulse" aria-hidden="true"></div>

                    class="avatar-img"
                    src="https://raw.githubusercontent.com/hate984890/maoklink/main/Maoklink-stiker1.jpg"

            <!-- 名字与频道描述 -->
            <div class="name-section">

                <p class="tagline">✦ 不定时分享资源的频道 ✦</p>
            </div>

            <div class="bio-section">
                <p class="bio-text">
                    这是一个不定时分享资源的频道<br>
                    欢迎你的加入，一起探索有趣的内容 ✨

            </div>

            <div class="divider" aria-hidden="true"></div>

            <!-- 社交入口卡片 -->
            <div class="social-cards">

                <!-- QQ群组 -->
                <a

                target="_blank"

                    </svg>
                </span>
                <span class="social-label">QQ群组</span>
                <span class="social-sub">群号 746626201</span>
            </a>

            <!-- 快手 -->
            <a
            class="social-card kuaishou"
            href="https://v.kuaishou.com/Jf0iG6vn"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="访问快手主页"
            title="打开快手"

<div class="toast" id="toast" aria-live="polite"></div>

<script>
    (function() {
        const toast = document.getElementById('toast');
        const avatarWrapper = document.getElementById('avatarWrapper');
        let toastTimer = null;

        function showToast(message) {
            if (toastTimer) clearTimeout(toastTimer);
            toast.textContent = message;
            toast.classList.add('show');
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // 头像点击反馈
        avatarWrapper.addEventListener('click', () => {
            avatarWrapper.style.transform = 'scale(0.9)';
            setTimeout(() => {
                avatarWrapper.style.transform = '';
            }, 200);
            showToast('👋 你好，我是 Maoklink');
        });

        console.log('✨ Maoklink 频道主页已就绪');
    })();
</script>
